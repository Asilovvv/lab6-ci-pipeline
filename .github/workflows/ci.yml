name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check Python
        run: |
          python3 --version
          pip3 --version

      - name: Create virtual environment
        run: |
          python3 -m venv .venv

      - name: Install dependencies
        run: |
          . .venv/bin/activate
          pip install flake8

      - name: Run lint
        run: |
          . .venv/bin/activate
          flake8 src tests

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Check Python
        run: |
          python3 --version
          pip3 --version

      - name: Create virtual environment
        run: |
          python3 -m venv .venv

      - name: Install dependencies
        run: |
          . .venv/bin/activate
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          . .venv/bin/activate
          pytest tests -v
